# ═══════════════════════════════════════════════════════════════════
#  LexOps — Google Cloud Build CI/CD Pipeline
#  Project: gen-lang-client-0154024574
#  Triggers on: push to main branch
# ═══════════════════════════════════════════════════════════════════

substitutions:
  _PROJECT_ID:    gen-lang-client-0154024574
  _REGION:        me-central1
  _REGISTRY:      me-central1-docker.pkg.dev
  _REPO:          lexops
  _SERVICE_NAME:  lexops-api
  _IMAGE:         me-central1-docker.pkg.dev/gen-lang-client-0154024574/lexops/api-service

options:
  logging:        CLOUD_LOGGING_ONLY
  machineType:    E2_HIGHCPU_8

steps:
  # ── Step 1: Install pnpm globally ─────────────────────────────────────────────
  - id: setup-pnpm
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - |
        corepack enable
        corepack prepare pnpm@9.1.0 --activate
        pnpm --version

  # ── Step 2: Install dependencies ──────────────────────────────────────────────
  - id: backend-install
    name: node:20-alpine
    entrypoint: sh
    waitFor: [setup-pnpm]
    args:
      - -c
      - |
        corepack enable && corepack prepare pnpm@9.1.0 --activate
        pnpm install --no-frozen-lockfile

  # ── Step 3: Build application ─────────────────────────────────────────────────
  - id: backend-build
    name: node:20-alpine
    entrypoint: sh
    waitFor: [backend-install]
    args:
      - -c
      - |
        corepack enable && corepack prepare pnpm@9.1.0 --activate
        pnpm run build

  # ── Step 4: Build Docker image ────────────────────────────────────────────────
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    waitFor: [backend-build]
    args:
      - build
      - -t
      - $_IMAGE:$SHORT_SHA
      - -t
      - $_IMAGE:latest
      - -f
      - Dockerfile
      - .

  # ── Step 5: Push image to Artifact Registry ───────────────────────────────────
  - id: docker-push
    name: gcr.io/cloud-builders/docker
    waitFor: [docker-build]
    args:
      - push
      - --all-tags
      - $_IMAGE

  # ── Step 6: Deploy to Cloud Run ───────────────────────────────────────────────
  - id: cloud-run-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [docker-push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --set-env-vars=NODE_ENV=production
      - --set-secrets=FIREBASE_SERVICE_ACCOUNT=FIREBASE_SERVICE_ACCOUNT:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,C9_HMAC_SECRET=C9_HMAC_SECRET:latest
      - --project=$_PROJECT_ID
